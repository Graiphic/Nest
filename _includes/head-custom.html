<script>
  (function () {
    var storageKey = "nest-theme-storage-key";
    var theme = "dark";

    try {
      var storedTheme = window.localStorage.getItem(storageKey);
      if (storedTheme === "light" || storedTheme === "dark") {
        theme = storedTheme;
      }
    } catch (error) {
    }

    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>

<script>
  (function () {
    var storageKey = "nest-theme-storage-key";

    function getStoredTheme() {
      try {
        var storedTheme = window.localStorage.getItem(storageKey);
        if (storedTheme === "light" || storedTheme === "dark") {
          return storedTheme;
        }
      } catch (error) {
      }

      return "dark";
    }

    function getCurrentTheme() {
      return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
    }

    function updateThemeToggle(button, theme) {
      var nextMode = theme === "dark" ? "light" : "dark";
      button.textContent = nextMode === "dark" ? "Dark mode" : "Light mode";
      button.setAttribute("aria-label", "Switch to " + nextMode + " mode");
      button.setAttribute("title", "Switch to " + nextMode + " mode");
      button.setAttribute("aria-pressed", String(theme === "light"));
    }

    function applyTheme(theme, persist) {
      var nextTheme = theme === "light" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", nextTheme);

      if (persist) {
        try {
          window.localStorage.setItem(storageKey, nextTheme);
        } catch (error) {
        }
      }

      var toggle = document.querySelector(".nest-theme-toggle");
      if (toggle) {
        updateThemeToggle(toggle, nextTheme);
      }
    }

    function appendThemeToggle() {
      if (!document.body || document.querySelector(".nest-theme-toggle")) {
        return;
      }

      var button = document.createElement("button");
      button.type = "button";
      button.className = "nest-theme-toggle";
      button.addEventListener("click", function () {
        var nextTheme = getCurrentTheme() === "dark" ? "light" : "dark";
        applyTheme(nextTheme, true);
      });

      document.body.appendChild(button);
      updateThemeToggle(button, getCurrentTheme());
    }

    function appendGitHubCorner() {
      if (!document.body || document.querySelector(".nest-github-corner")) {
        return;
      }

      var anchor = document.createElement("a");
      anchor.className = "nest-github-corner";
      anchor.href = "https://github.com/Graiphic/Nest";
      anchor.setAttribute("aria-label", "View on GitHub");
      anchor.setAttribute("title", "View on GitHub");
      anchor.innerHTML = [
        '<span class="nest-sr-only">View on GitHub</span>',
        '<svg viewBox="0 0 250 250" aria-hidden="true">',
        '<path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>',
        '<path class="octo-arm" d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;"></path>',
        '<path class="octo-body" d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 186.8,61.8 189.9,65.4 C193.5,68.5 196.7,72.2 199.1,76.5 C212.8,79.2 215.2,83.9 215.2,83.9 C211.7,92.1 205.9,95.0 204.3,95.6 C204.1,101.4 201.9,106.9 197.2,111.5 C180.9,127.9 167.3,121.5 156.7,113.2 C156.9,115.5 156.1,118.5 153.7,121.7 L139.8,135.6 C138.7,136.7 140.1,140.5 140.0,140.4 Z" fill="currentColor" style="transform-origin: 130px 106px;"></path>',
        '</svg>'
      ].join("");

      document.body.appendChild(anchor);
    }

    function initializeThemeChrome() {
      appendThemeToggle();
      appendGitHubCorner();
      applyTheme(getStoredTheme(), false);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initializeThemeChrome, { once: true });
    } else {
      initializeThemeChrome();
    }
  })();
</script>
